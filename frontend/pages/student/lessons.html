<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Уроки — Школьный журнал</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/custom.css">
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">
    <div id="navbar"></div>
    <div id="sidebar"></div>

    <div class="content-wrapper">
        <div class="content-header">
            <div class="container-fluid">
                <div class="row mb-2">
                    <div class="col-sm-6"><h1 class="m-0">Расписание уроков</h1></div>
                    <div class="col-sm-6">
                        <ol class="breadcrumb float-sm-right">
                            <li class="breadcrumb-item"><a href="/pages/student/dashboard.html">Главная</a></li>
                            <li class="breadcrumb-item active">Уроки</li>
                        </ol>
                    </div>
                </div>
            </div>
        </div>

        <section class="content">
            <div class="container-fluid">
                <div id="alerts"></div>

                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title"><i class="fas fa-calendar-alt mr-2"></i>Мои уроки</h3>
                        <div class="card-tools d-flex align-items-center gap-2">
                            <select class="form-control form-control-sm mr-2" id="filter-subject" style="width:160px">
                                <option value="">Все предметы</option>
                            </select>
                            <input type="date" class="form-control form-control-sm mr-2" id="filter-date-from" style="width:150px" placeholder="С">
                            <input type="date" class="form-control form-control-sm" id="filter-date-to" style="width:150px" placeholder="По">
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>Дата</th>
                                    <th>Предмет</th>
                                    <th>Тема урока</th>
                                    <th>Учитель</th>
                                    <th>Оценка</th>
                                    <th>Посещаемость</th>
                                </tr>
                            </thead>
                            <tbody id="lessons-tbody">
                                <tr><td colspan="6" class="text-center py-4"><i class="fas fa-spinner fa-spin"></i></td></tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="card-footer text-muted" id="lessons-footer"></div>
                </div>
            </div>
        </section>
    </div>
    <footer class="main-footer"><strong>Школьный журнал</strong> &copy; 2024</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/guards.js"></script>
<script src="/js/pages/student/common.js"></script>
<script>
    requireAuth('student');

    let allLessons = [], gradesMap = {}, attendancesMap = {};

    function renderLessons(lessons) {
        const tbody = document.getElementById('lessons-tbody');
        document.getElementById('lessons-footer').textContent = `Показано: ${lessons.length} уроков`;
        if (!lessons.length) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-3">Уроков нет</td></tr>';
            return;
        }
        tbody.innerHTML = lessons.map(l => {
            const grade = gradesMap[l.id];
            const att = attendancesMap[l.id];
            const gradeHtml = grade
                ? `<span class="badge badge-${GRADE_COLORS[grade.value]} px-2" style="font-size:1rem">${grade.value}</span>`
                : '<span class="text-muted">—</span>';
            const attInfo = att ? ATTENDANCE_LABELS[att.status] : null;
            const attHtml = att
                ? `<span class="badge badge-${attInfo.color}">${attInfo.label}</span>`
                : '<span class="text-muted">—</span>';
            return `<tr>
                <td>${l.date}</td>
                <td><strong>${l.subject_name || '—'}</strong></td>
                <td>${l.topic || '<span class="text-muted">—</span>'}</td>
                <td><small>${l.teacher_name || '—'}</small></td>
                <td>${gradeHtml}</td>
                <td>${attHtml}</td>
            </tr>`;
        }).join('');
    }

    function applyFilters() {
        const subj = document.getElementById('filter-subject').value;
        const from = document.getElementById('filter-date-from').value;
        const to = document.getElementById('filter-date-to').value;
        let filtered = allLessons;
        if (subj) filtered = filtered.filter(l => l.subject_name === subj);
        if (from) filtered = filtered.filter(l => l.date >= from);
        if (to) filtered = filtered.filter(l => l.date <= to);
        renderLessons(filtered);
    }

    ['filter-subject', 'filter-date-from', 'filter-date-to'].forEach(id => {
        document.getElementById(id).addEventListener('change', applyFilters);
    });

    (async () => {
        const me = await loadStudentComponents('lessons');

        const [lessons, grades, attendances] = await Promise.all([
            api.get('/lessons/'),
            api.get(`/grades/?student_id=${me.id}`),
            api.get(`/attendances/?student_id=${me.id}`),
        ]);

        grades.forEach(g => { gradesMap[g.lesson_id] = g; });
        attendances.forEach(a => { attendancesMap[a.lesson_id] = a; });

        allLessons = lessons;

        // Populate subject filter
        const subjects = [...new Set(lessons.map(l => l.subject_name).filter(Boolean))].sort();
        const sel = document.getElementById('filter-subject');
        subjects.forEach(s => {
            const opt = document.createElement('option');
            opt.value = s;
            opt.textContent = s;
            sel.appendChild(opt);
        });

        renderLessons(lessons);
    })();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head><meta charset="UTF-8"><title>Редирект</title></head>
<body>
<script>
    // Завуч не может редактировать других пользователей
    const id = new URLSearchParams(window.location.search).get('id');
    const myId = sessionStorage.getItem('user_id');
    if (id && id === myId) {
        window.location.replace('/pages/vice_principal/users/profile.html');
    } else if (id) {
        window.location.replace('/pages/vice_principal/users/view.html?id=' + id);
    } else {
        window.location.replace('/pages/vice_principal/users/index.html');
    }
</script>
</body>
</html>

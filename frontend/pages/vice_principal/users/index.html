<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пользователи — Школьный журнал</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/custom.css">
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">
    <div id="navbar"></div>
    <div id="sidebar"></div>

    <div class="content-wrapper">
        <div class="content-header">
            <div class="container-fluid">
                <div class="row mb-2">
                    <div class="col-sm-6"><h1 class="m-0">Пользователи</h1></div>
                    <div class="col-sm-6">
                        <ol class="breadcrumb float-sm-right">
                            <li class="breadcrumb-item"><a href="/pages/vice_principal/dashboard.html">Главная</a></li>
                            <li class="breadcrumb-item active">Пользователи</li>
                        </ol>
                    </div>
                </div>
            </div>
        </div>

        <section class="content">
            <div class="container-fluid">
                <div id="alerts"></div>
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title"><i class="fas fa-users mr-2"></i>Список пользователей</h3>
                        <div class="card-tools d-flex align-items-center gap-2">
                            <select class="form-control form-control-sm mr-2" id="filter-role" style="width:160px">
                                <option value="">Все роли</option>
                                <option value="admin">Администратор</option>
                                <option value="vice_principal">Завуч</option>
                                <option value="teacher">Учитель</option>
                                <option value="student">Ученик</option>
                                <option value="parent">Родитель</option>
                            </select>
                            <a href="/pages/vice_principal/users/create.html" class="btn btn-sm btn-primary">
                                <i class="fas fa-plus"></i> Добавить
                            </a>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <table class="table table-hover table-striped">
                            <thead>
                                <tr>
                                    <th>ФИО</th>
                                    <th>Email</th>
                                    <th>Роль</th>
                                    <th>Статус</th>
                                    <th style="width:60px">Профиль</th>
                                </tr>
                            </thead>
                            <tbody id="users-tbody">
                                <tr><td colspan="5" class="text-center py-4"><i class="fas fa-spinner fa-spin"></i></td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <footer class="main-footer"><strong>Школьный журнал</strong> &copy; 2024</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/guards.js"></script>
<script src="/js/pages/vice_principal/common.js"></script>
<script>
    requireAuth('vice_principal');

    let allUsers = [];

    function renderTable(users) {
        const tbody = document.getElementById('users-tbody');
        if (!users.length) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center py-3 text-muted">Пользователи не найдены</td></tr>';
            return;
        }
        const myId = sessionStorage.getItem('user_id');
        tbody.innerHTML = users.map(u => {
            const r = ROLE_LABELS[u.role] || u.role;
            const c = ROLE_COLORS[u.role] || 'secondary';
            const isSelf = u.id === myId;
            return `<tr>
                <td>${u.last_name} ${u.first_name} ${u.middle_name || ''}</td>
                <td>${u.email}</td>
                <td><span class="badge badge-${c}">${r}</span></td>
                <td>${u.is_active
                    ? '<span class="badge badge-success">Активен</span>'
                    : '<span class="badge badge-secondary">Отключён</span>'}</td>
                <td>
                    ${isSelf
                        ? `<a href="/pages/vice_principal/users/profile.html?id=${u.id}" class="btn btn-xs btn-primary" title="Мой профиль"><i class="fas fa-user-edit"></i></a>`
                        : `<a href="/pages/vice_principal/users/view.html?id=${u.id}" class="btn btn-xs btn-secondary" title="Просмотр"><i class="fas fa-eye"></i></a>`}
                </td>
            </tr>`;
        }).join('');
    }

    function applyFilter() {
        const role = document.getElementById('filter-role').value;
        renderTable(role ? allUsers.filter(u => u.role === role) : allUsers);
    }

    document.getElementById('filter-role').addEventListener('change', applyFilter);

    (async () => {
        await loadVPComponents('users');
        allUsers = await api.get('/users/');
        applyFilter();
    })();
</script>
</body>
</html>

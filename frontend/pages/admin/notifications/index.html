<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Уведомления — Школьный журнал</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/custom.css">
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">
    <div id="navbar"></div>
    <div id="sidebar"></div>

    <div class="content-wrapper">
        <div class="content-header">
            <div class="container-fluid">
                <div class="row mb-2">
                    <div class="col-sm-6"><h1 class="m-0">Уведомления</h1></div>
                    <div class="col-sm-6">
                        <ol class="breadcrumb float-sm-right">
                            <li class="breadcrumb-item"><a href="/pages/admin/dashboard.html">Главная</a></li>
                            <li class="breadcrumb-item active">Уведомления</li>
                        </ol>
                    </div>
                </div>
            </div>
        </div>

        <section class="content">
            <div class="container-fluid">
                <div id="alerts"></div>
                <div class="row">
                    <div class="col-md-8">
                        <div class="card">
                            <div class="card-header">
                                <h3 class="card-title"><i class="fas fa-bell mr-2"></i>Мои уведомления</h3>
                                <div class="card-tools">
                                    <button class="btn btn-sm btn-primary" data-bs-toggle="modal" data-bs-target="#send-modal">
                                        <i class="fas fa-paper-plane"></i> Отправить
                                    </button>
                                </div>
                            </div>
                            <div class="card-body p-0" id="notifications-list">
                                <div class="text-center py-4">
                                    <i class="fas fa-spinner fa-spin"></i> Загрузка...
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- Send modal -->
    <div class="modal fade" id="send-modal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title"><i class="fas fa-paper-plane mr-2"></i>Отправить уведомление</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form id="send-form">
                    <div class="modal-body">
                        <div class="form-group">
                            <label>Получатель <span class="text-danger">*</span></label>
                            <select class="form-control" id="recipient-select" required>
                                <option value="">— Выберите пользователя —</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Заголовок <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="notif-title" required minlength="2" maxlength="255">
                        </div>
                        <div class="form-group">
                            <label>Сообщение <span class="text-danger">*</span></label>
                            <textarea class="form-control" id="notif-body" rows="4" required minlength="2" maxlength="5000"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-paper-plane"></i> Отправить
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer class="main-footer"><strong>Школьный журнал</strong> &copy; 2024</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/guards.js"></script>
<script>
    requireAuth('admin', 'vice_principal');

    function showAlert(msg, type = 'danger') {
        document.getElementById('alerts').innerHTML = `
            <div class="alert alert-${type} alert-dismissible fade show">
                <i class="fas fa-${type === 'success' ? 'check' : 'exclamation'}-circle mr-2"></i>${msg}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>`;
    }

    async function loadNotifications() {
        const notifs = await api.get('/notifications/');
        const container = document.getElementById('notifications-list');

        if (!notifs.length) {
            container.innerHTML = '<div class="text-center text-muted py-4">Нет уведомлений</div>';
            return;
        }

        container.innerHTML = notifs.map(n => `
            <div class="d-flex align-items-start p-3 border-bottom ${n.is_read ? '' : 'bg-light'}">
                <i class="fas fa-bell ${n.is_read ? 'text-muted' : 'text-primary'} mr-3 mt-1 flex-shrink-0"></i>
                <div class="flex-grow-1 notif-text">
                    <div class="d-flex justify-content-between align-items-start mb-1">
                        <strong class="notif-title">${n.title}</strong>
                        <small class="text-muted ml-2 flex-shrink-0">${new Date(n.created_at).toLocaleString('ru')}</small>
                    </div>
                    <div class="text-muted notif-body">${n.body}</div>
                </div>
                <div class="ml-3 flex-shrink-0">
                    ${!n.is_read ? `<button class="btn btn-xs btn-outline-primary" onclick="markRead('${n.id}', this)">
                        <i class="fas fa-check"></i>
                    </button>` : ''}
                </div>
            </div>`).join('');
    }

    async function markRead(id, btn) {
        try {
            await api.patch(`/notifications/${id}/read`);
            btn.closest('.d-flex').classList.remove('bg-light');
            btn.remove();
        } catch (err) { showAlert(err.message); }
    }

    document.getElementById('send-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        try {
            await api.post('/notifications/', {
                recipient_id: document.getElementById('recipient-select').value,
                title:        document.getElementById('notif-title').value,
                body:         document.getElementById('notif-body').value,
            });
            bootstrap.Modal.getInstance(document.getElementById('send-modal')).hide();
            e.target.reset();
            showAlert('Уведомление отправлено', 'success');
            await loadNotifications();
        } catch (err) { showAlert(err.message); }
    });

    async function loadComponents() {
        const role = sessionStorage.getItem('role');
        const sidebarFile = role === 'vice_principal' ? 'sidebar-vp' : 'sidebar-admin';
        const [navHtml, sideHtml] = await Promise.all([
            fetch('/components/navbar.html').then(r => r.text()),
            fetch(`/components/${sidebarFile}.html`).then(r => r.text()),
        ]);
        document.getElementById('navbar').innerHTML = navHtml;
        document.getElementById('sidebar').innerHTML = sideHtml;
        const me = await api.get('/users/me');
        document.getElementById('navbar-user-name').textContent = `${me.last_name} ${me.first_name}`;
        document.getElementById('sidebar-user-name').textContent = `${me.last_name} ${me.first_name}`;
    }

    async function loadRecipients() {
        const users = await api.get('/users/');
        const select = document.getElementById('recipient-select');
        users.forEach(u => {
            const opt = document.createElement('option');
            opt.value = u.id;
            opt.textContent = `${u.last_name} ${u.first_name} (${u.email})`;
            select.appendChild(opt);
        });
    }

    (async () => {
        await loadComponents();
        await Promise.all([loadNotifications(), loadRecipients()]);
    })();
</script>
</body>
</html>

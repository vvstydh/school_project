<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создать класс — Зурнал</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/custom.css">
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">
    <div id="navbar"></div>
    <div id="sidebar"></div>

    <div class="content-wrapper">
        <div class="content-header">
            <div class="container-fluid">
                <div class="row mb-2">
                    <div class="col-sm-6"><h1 class="m-0">Создать класс</h1></div>
                    <div class="col-sm-6">
                        <ol class="breadcrumb float-sm-right">
                            <li class="breadcrumb-item"><a href="/pages/admin/dashboard.html">Главная</a></li>
                            <li class="breadcrumb-item"><a href="/pages/admin/classes/index.html">Классы</a></li>
                            <li class="breadcrumb-item active">Создать</li>
                        </ol>
                    </div>
                </div>
            </div>
        </div>

        <section class="content">
            <div class="container-fluid">
                <div id="alerts"></div>
                <div class="row">
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">
                                <h3 class="card-title"><i class="fas fa-chalkboard mr-2"></i>Новый класс</h3>
                            </div>
                            <form id="create-form">
                                <div class="card-body">
                                    <div class="form-group">
                                        <label>Название класса <span class="text-danger">*</span></label>
                                        <input type="text" class="form-control" name="name" id="name-input"
                                               required placeholder="9А" maxlength="3"
                                               autocomplete="off">
                                        <small class="text-muted">Номер 1–11 + буква (кроме Й, Ъ, Ы, Ь). Пример: 1А, 9Б, 11В</small>
                                        <div id="name-error" class="invalid-feedback"></div>
                                    </div>
                                    <div class="form-group">
                                        <label>Учебный год</label>
                                        <input type="hidden" name="academic_year" id="academic-year-value">
                                        <div class="form-control-plaintext">
                                            <strong id="academic-year-display">—</strong>
                                        </div>
                                        <small class="text-muted">Создание доступно только для текущего учебного года</small>
                                    </div>
                                </div>
                                <div class="card-footer">
                                    <button type="submit" class="btn btn-primary" id="submit-btn">
                                        <i class="fas fa-save"></i> Создать
                                    </button>
                                    <a href="/pages/admin/classes/index.html" class="btn btn-secondary ml-2">
                                        <i class="fas fa-times"></i> Отмена
                                    </a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <footer class="main-footer"><strong>Зурнал</strong> &copy; 2024</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/guards.js"></script>
<script>
    requireAuth('admin', 'vice_principal');

    // Допустимые буквы (без Й, Ъ, Ы, Ь)
    const CLASS_NAME_RE = /^([1-9]|1[01])[АБВГДЕЁЖЗИКЛМНОПРСТУФХЦЧШЩЭЮЯ]$/;
    const FORBIDDEN_LETTERS = 'ЙЪЫЬ';

    function validateClassName(value) {
        if (!value) return 'Введите название класса';
        const numMatch = value.match(/^(\d+)/);
        if (!numMatch) return 'Название должно начинаться с цифры (1–11)';
        const num = parseInt(numMatch[1]);
        if (num < 1 || num > 11) return `Номер класса ${num} недопустим — допустимо от 1 до 11`;
        const letter = value.slice(numMatch[1].length);
        if (!letter) return 'Добавьте букву класса (например: А, Б, В)';
        if (letter.length > 1) return 'Буква класса — один символ';
        if (FORBIDDEN_LETTERS.includes(letter)) return `Буква «${letter}» не используется в названиях классов`;
        if (!CLASS_NAME_RE.test(value)) return 'Буква должна быть заглавной кириллицей';
        return null;
    }

    function getCurrentAcademicYear() {
        const now = new Date();
        const year = now.getFullYear();
        return now.getMonth() >= 8 ? year : year - 1; // >= 8 = сентябрь (0-based)
    }

    // Установить учебный год
    const academicYear = getCurrentAcademicYear();
    document.getElementById('academic-year-value').value = academicYear;
    document.getElementById('academic-year-display').textContent = `${academicYear}–${academicYear + 1}`;

    // Валидация поля названия в реальном времени
    const nameInput = document.getElementById('name-input');
    const nameError = document.getElementById('name-error');

    nameInput.addEventListener('input', () => {
        const err = validateClassName(nameInput.value.trim().toUpperCase());
        if (err) {
            nameInput.classList.add('is-invalid');
            nameError.textContent = err;
        } else {
            nameInput.classList.remove('is-invalid');
            nameInput.classList.add('is-valid');
            nameError.textContent = '';
        }
    });

    // Автоперевод в верхний регистр
    nameInput.addEventListener('input', () => {
        const pos = nameInput.selectionStart;
        nameInput.value = nameInput.value.toUpperCase();
        nameInput.setSelectionRange(pos, pos);
    });

    async function loadComponents() {
        const role = sessionStorage.getItem('role');
        const sidebarFile = role === 'vice_principal' ? 'sidebar-vp' : 'sidebar-admin';
        const [navHtml, sideHtml] = await Promise.all([
            fetch('/components/navbar.html').then(r => r.text()),
            fetch(`/components/${sidebarFile}.html`).then(r => r.text()),
        ]);
        document.getElementById('navbar').innerHTML = navHtml;
        document.getElementById('sidebar').innerHTML = sideHtml;
        const me = await api.get('/users/me');
        document.getElementById('navbar-user-name').textContent = `${me.last_name} ${me.first_name}`;
        document.getElementById('sidebar-user-name').textContent = `${me.last_name} ${me.first_name}`;
    }

    document.getElementById('create-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        const alerts = document.getElementById('alerts');
        alerts.innerHTML = '';

        const name = nameInput.value.trim().toUpperCase();
        const validationError = validateClassName(name);
        if (validationError) {
            nameInput.classList.add('is-invalid');
            nameError.textContent = validationError;
            nameInput.focus();
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Сохранение...';

        const body = {
            name,
            academic_year: parseInt(document.getElementById('academic-year-value').value),
        };

        try {
            await api.post('/classes/', body);
            window.location.href = '/pages/admin/classes/index.html';
        } catch (err) {
            alerts.innerHTML = `
                <div class="alert alert-danger alert-dismissible fade show">
                    <i class="fas fa-exclamation-circle mr-2"></i>${err.message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>`;
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save"></i> Создать';
        }
    });

    (async () => {
        await loadComponents();
    })();
</script>
</body>
</html>

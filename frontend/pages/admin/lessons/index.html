<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Уроки — Школьный журнал</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/custom.css">
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">
    <div id="navbar"></div>
    <div id="sidebar"></div>

    <div class="content-wrapper">
        <div class="content-header">
            <div class="container-fluid">
                <div class="row mb-2">
                    <div class="col-sm-6"><h1 class="m-0">Уроки</h1></div>
                    <div class="col-sm-6">
                        <ol class="breadcrumb float-sm-right">
                            <li class="breadcrumb-item"><a href="/pages/admin/dashboard.html">Главная</a></li>
                            <li class="breadcrumb-item active">Уроки</li>
                        </ol>
                    </div>
                </div>
            </div>
        </div>

        <section class="content">
            <div class="container-fluid">
                <div id="alerts"></div>
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title"><i class="fas fa-calendar-alt mr-2"></i>Список уроков</h3>
                        <div class="card-tools d-flex align-items-center gap-2">
                            <select class="form-control form-control-sm mr-2" id="filter-class" style="width:140px">
                                <option value="">Все классы</option>
                            </select>
                            <button class="btn btn-sm btn-primary" data-bs-toggle="modal" data-bs-target="#create-modal">
                                <i class="fas fa-plus"></i> Добавить
                            </button>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <table class="table table-hover table-striped">
                            <thead>
                                <tr>
                                    <th>Дата</th>
                                    <th>Класс</th>
                                    <th>Учитель</th>
                                    <th>Предмет</th>
                                    <th>Тема</th>
                                    <th style="width:100px">Действия</th>
                                </tr>
                            </thead>
                            <tbody id="lessons-tbody">
                                <tr><td colspan="6" class="text-center py-4"><i class="fas fa-spinner fa-spin"></i> Загрузка...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- Create modal -->
    <div class="modal fade" id="create-modal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title"><i class="fas fa-plus mr-2"></i>Новый урок</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form id="create-form">
                    <div class="modal-body">
                        <div class="form-group">
                            <label>Класс <span class="text-danger">*</span></label>
                            <select class="form-control" id="create-class" required>
                                <option value="">— Выберите класс —</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Учитель <span class="text-danger">*</span></label>
                            <select class="form-control" id="create-teacher" required>
                                <option value="">— Выберите учителя —</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Предмет <span class="text-danger">*</span></label>
                            <select class="form-control" id="create-subject" required>
                                <option value="">— Выберите предмет —</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Дата <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" id="create-date" required>
                        </div>
                        <div class="form-group">
                            <label>Тема урока</label>
                            <input type="text" class="form-control" id="create-topic" placeholder="Необязательно">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Создать</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Edit modal -->
    <div class="modal fade" id="edit-modal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-info text-white">
                    <h5 class="modal-title"><i class="fas fa-edit mr-2"></i>Редактировать урок</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form id="edit-form">
                    <div class="modal-body">
                        <div class="form-group">
                            <label>Дата <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" id="edit-date" required>
                        </div>
                        <div class="form-group">
                            <label>Тема урока</label>
                            <input type="text" class="form-control" id="edit-topic">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                        <button type="submit" class="btn btn-info"><i class="fas fa-save"></i> Сохранить</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Delete modal -->
    <div class="modal fade" id="delete-modal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title"><i class="fas fa-trash mr-2"></i>Удалить урок</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">Удалить урок <strong id="delete-desc"></strong>?</div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="button" class="btn btn-danger" id="confirm-delete"><i class="fas fa-trash"></i> Удалить</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="main-footer"><strong>Школьный журнал</strong> &copy; 2024</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/guards.js"></script>
<script>
    requireAuth('admin', 'vice_principal');

    let classesMap = {}, teachersMap = {}, subjectsMap = {};
    let allLessons = [], editId = null, deleteId = null;

    function showAlert(msg, type = 'danger') {
        document.getElementById('alerts').innerHTML = `
            <div class="alert alert-${type} alert-dismissible fade show">
                <i class="fas fa-${type === 'success' ? 'check' : 'exclamation'}-circle mr-2"></i>${msg}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>`;
    }

    function renderLessons(lessons) {
        const tbody = document.getElementById('lessons-tbody');
        if (!lessons.length) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-3 text-muted">Уроки не найдены</td></tr>';
            return;
        }
        tbody.innerHTML = lessons.map(l => `<tr>
            <td>${l.date}</td>
            <td>${classesMap[l.class_id] || '—'}</td>
            <td>${teachersMap[l.teacher_id] || '—'}</td>
            <td>${subjectsMap[l.subject_id] || '—'}</td>
            <td>${l.topic || '<span class="text-muted">—</span>'}</td>
            <td>
                <button class="btn btn-xs btn-info mr-1" onclick="openEdit('${l.id}','${l.date}','${l.topic || ''}')">
                    <i class="fas fa-edit"></i>
                </button>
                <button class="btn btn-xs btn-danger" onclick="openDelete('${l.id}','${l.date} ${subjectsMap[l.subject_id] || ''}')">
                    <i class="fas fa-trash"></i>
                </button>
            </td>
        </tr>`).join('');
    }

    async function loadLessons() {
        const filterClass = document.getElementById('filter-class').value;
        const url = filterClass ? `/lessons/?class_id=${filterClass}` : '/lessons/';
        allLessons = await api.get(url);
        renderLessons(allLessons);
    }

    function openEdit(id, date, topic) {
        editId = id;
        document.getElementById('edit-date').value = date;
        document.getElementById('edit-topic').value = topic;
        new bootstrap.Modal(document.getElementById('edit-modal')).show();
    }

    function openDelete(id, desc) {
        deleteId = id;
        document.getElementById('delete-desc').textContent = desc;
        new bootstrap.Modal(document.getElementById('delete-modal')).show();
    }

    document.getElementById('filter-class').addEventListener('change', loadLessons);

    document.getElementById('create-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const topic = document.getElementById('create-topic').value.trim();
        const body = {
            class_id:   document.getElementById('create-class').value,
            teacher_id: document.getElementById('create-teacher').value,
            subject_id: document.getElementById('create-subject').value,
            date:       document.getElementById('create-date').value,
        };
        if (topic) body.topic = topic;
        try {
            await api.post('/lessons/', body);
            bootstrap.Modal.getInstance(document.getElementById('create-modal')).hide();
            e.target.reset();
            showAlert('Урок создан', 'success');
            await loadLessons();
        } catch (err) { showAlert(err.message); }
    });

    document.getElementById('edit-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const topic = document.getElementById('edit-topic').value.trim();
        const body = { date: document.getElementById('edit-date').value };
        if (topic) body.topic = topic;
        try {
            await api.patch(`/lessons/${editId}`, body);
            bootstrap.Modal.getInstance(document.getElementById('edit-modal')).hide();
            showAlert('Урок обновлён', 'success');
            await loadLessons();
        } catch (err) { showAlert(err.message); }
    });

    document.getElementById('confirm-delete').addEventListener('click', async () => {
        try {
            await api.delete(`/lessons/${deleteId}`);
            bootstrap.Modal.getInstance(document.getElementById('delete-modal')).hide();
            showAlert('Урок удалён', 'success');
            await loadLessons();
        } catch (err) { showAlert(err.message); }
    });

    async function loadComponents() {
        const role = sessionStorage.getItem('role');
        const sidebarFile = role === 'vice_principal' ? 'sidebar-vp' : 'sidebar-admin';
        const [navHtml, sideHtml] = await Promise.all([
            fetch('/components/navbar.html').then(r => r.text()),
            fetch(`/components/${sidebarFile}.html`).then(r => r.text()),
        ]);
        document.getElementById('navbar').innerHTML = navHtml;
        document.getElementById('sidebar').innerHTML = sideHtml;
        const me = await api.get('/users/me');
        document.getElementById('navbar-user-name').textContent = `${me.last_name} ${me.first_name}`;
        document.getElementById('sidebar-user-name').textContent = `${me.last_name} ${me.first_name}`;
    }

    (async () => {
        await loadComponents();

        const [users, classes, subjects] = await Promise.all([
            api.get('/users/'),
            api.get('/classes/'),
            api.get('/subjects/'),
        ]);

        users.filter(u => u.role === 'teacher').forEach(u => {
            teachersMap[u.id] = `${u.last_name} ${u.first_name}`;
        });
        classes.forEach(c => { classesMap[c.id] = `${c.name} (${c.academic_year})`; });
        subjects.forEach(s => { subjectsMap[s.id] = s.name; });

        // Populate filter-class
        const filterSel = document.getElementById('filter-class');
        classes.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c.id;
            opt.textContent = `${c.name} (${c.academic_year})`;
            filterSel.appendChild(opt);
        });

        // Populate create form selects
        const createClass = document.getElementById('create-class');
        classes.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c.id;
            opt.textContent = `${c.name} (${c.academic_year})`;
            createClass.appendChild(opt);
        });

        const createTeacher = document.getElementById('create-teacher');
        users.filter(u => u.role === 'teacher').forEach(u => {
            const opt = document.createElement('option');
            opt.value = u.id;
            opt.textContent = `${u.last_name} ${u.first_name}`;
            createTeacher.appendChild(opt);
        });

        const createSubject = document.getElementById('create-subject');
        subjects.forEach(s => {
            const opt = document.createElement('option');
            opt.value = s.id;
            opt.textContent = s.name;
            createSubject.appendChild(opt);
        });

        document.getElementById('create-date').value = new Date().toISOString().slice(0, 10);

        await loadLessons();
    })();
</script>
</body>
</html>

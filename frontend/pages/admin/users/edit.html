<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактировать пользователя — Школьный журнал</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/custom.css">
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">
    <div id="navbar"></div>
    <div id="sidebar"></div>

    <div class="content-wrapper">
        <div class="content-header">
            <div class="container-fluid">
                <div class="row mb-2">
                    <div class="col-sm-6"><h1 class="m-0">Редактировать пользователя</h1></div>
                    <div class="col-sm-6">
                        <ol class="breadcrumb float-sm-right">
                            <li class="breadcrumb-item"><a href="/pages/admin/dashboard.html">Главная</a></li>
                            <li class="breadcrumb-item"><a href="/pages/admin/users/index.html">Пользователи</a></li>
                            <li class="breadcrumb-item active">Редактировать</li>
                        </ol>
                    </div>
                </div>
            </div>
        </div>

        <section class="content">
            <div class="container-fluid">
                <div id="alerts"></div>
                <div class="row">
                    <div class="col-md-8">
                        <div class="card">
                            <div class="card-header">
                                <h3 class="card-title"><i class="fas fa-user-edit mr-2"></i>Данные пользователя</h3>
                            </div>
                            <form id="edit-form">
                                <div class="card-body">
                                    <div class="row">
                                        <div class="col-md-4">
                                            <div class="form-group">
                                                <label>Фамилия <span class="text-danger">*</span></label>
                                                <input type="text" class="form-control" name="last_name" required>
                                            </div>
                                        </div>
                                        <div class="col-md-4">
                                            <div class="form-group">
                                                <label>Имя <span class="text-danger">*</span></label>
                                                <input type="text" class="form-control" name="first_name" required>
                                            </div>
                                        </div>
                                        <div class="col-md-4">
                                            <div class="form-group">
                                                <label>Отчество</label>
                                                <input type="text" class="form-control" name="middle_name">
                                            </div>
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <label>Email <span class="text-danger">*</span></label>
                                        <input type="email" class="form-control" name="email" required>
                                    </div>
                                    <div class="form-group">
                                        <label>Новый пароль <small class="text-muted">(оставьте пустым чтобы не менять)</small></label>
                                        <input type="password" class="form-control" name="password" minlength="8">
                                    </div>
                                    <div class="form-group">
                                        <label>Роль <span class="text-danger">*</span></label>
                                        <select class="form-control" name="role" required>
                                            <option value="admin">Администратор</option>
                                            <option value="vice_principal">Завуч</option>
                                            <option value="teacher">Учитель</option>
                                            <option value="student">Ученик</option>
                                            <option value="parent">Родитель</option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <div class="custom-control custom-switch">
                                            <input type="checkbox" class="custom-control-input" id="is_active" name="is_active">
                                            <label class="custom-control-label" for="is_active">Аккаунт активен</label>
                                        </div>
                                    </div>
                                </div>
                                <div class="card-footer">
                                    <button type="submit" class="btn btn-primary" id="submit-btn">
                                        <i class="fas fa-save"></i> Сохранить
                                    </button>
                                    <a href="/pages/admin/users/index.html" class="btn btn-secondary ml-2">
                                        <i class="fas fa-times"></i> Отмена
                                    </a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <footer class="main-footer"><strong>Школьный журнал</strong> &copy; 2024</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/guards.js"></script>
<script>
    requireAuth('admin');

    const userId = new URLSearchParams(window.location.search).get('id');
    if (!userId) window.location.href = '/pages/admin/users/index.html';

    function showAlert(msg, type = 'danger') {
        document.getElementById('alerts').innerHTML = `
            <div class="alert alert-${type} alert-dismissible fade show">
                <i class="fas fa-${type === 'success' ? 'check' : 'exclamation'}-circle mr-2"></i>${msg}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>`;
    }

    async function loadComponents() {
        const [navHtml, sideHtml] = await Promise.all([
            fetch('/components/navbar.html').then(r => r.text()),
            fetch('/components/sidebar-admin.html').then(r => r.text()),
        ]);
        document.getElementById('navbar').innerHTML = navHtml;
        document.getElementById('sidebar').innerHTML = sideHtml;
        const me = await api.get('/users/me');
        document.getElementById('navbar-user-name').textContent = `${me.last_name} ${me.first_name}`;
        document.getElementById('sidebar-user-name').textContent = `${me.last_name} ${me.first_name}`;
    }

    async function loadUser() {
        const user = await api.get(`/users/${userId}`);
        const form = document.getElementById('edit-form');
        form.last_name.value   = user.last_name;
        form.first_name.value  = user.first_name;
        form.middle_name.value = user.middle_name || '';
        form.email.value       = user.email;
        form.role.value        = user.role;
        document.getElementById('is_active').checked = user.is_active;
    }

    document.getElementById('edit-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Сохранение...';

        const fd = new FormData(e.target);
        const body = {
            last_name:   fd.get('last_name'),
            first_name:  fd.get('first_name'),
            middle_name: fd.get('middle_name') || null,
            email:       fd.get('email'),
            role:        fd.get('role'),
            is_active:   document.getElementById('is_active').checked,
        };
        const pw = fd.get('password');
        if (pw) body.password = pw;

        try {
            await api.patch(`/users/${userId}`, body);
            showAlert('Пользователь обновлён', 'success');
            setTimeout(() => window.location.href = '/pages/admin/users/index.html', 1000);
        } catch (err) {
            showAlert(err.message);
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save"></i> Сохранить';
        }
    });

    (async () => {
        await loadComponents();
        await loadUser();
    })();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Уведомления — Школьный журнал</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/custom.css">
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">
    <div id="navbar"></div>
    <div id="sidebar"></div>

    <div class="content-wrapper">
        <div class="content-header">
            <div class="container-fluid">
                <div class="row mb-2">
                    <div class="col-sm-6"><h1 class="m-0">Уведомления</h1></div>
                    <div class="col-sm-6">
                        <ol class="breadcrumb float-sm-right">
                            <li class="breadcrumb-item"><a href="/pages/teacher/dashboard.html">Главная</a></li>
                            <li class="breadcrumb-item active">Уведомления</li>
                        </ol>
                    </div>
                </div>
            </div>
        </div>

        <section class="content">
            <div class="container-fluid">
                <div id="alerts"></div>
                <div class="row">
                    <div class="col-md-8">
                        <div class="card">
                            <div class="card-header">
                                <h3 class="card-title"><i class="fas fa-bell mr-2"></i>Мои уведомления</h3>
                                <div class="card-tools d-flex align-items-center">
                                    <div class="custom-control custom-switch mr-3">
                                        <input type="checkbox" class="custom-control-input" id="unread-only">
                                        <label class="custom-control-label" for="unread-only">Только непрочитанные</label>
                                    </div>
                                    <button class="btn btn-sm btn-primary" data-bs-toggle="modal" data-bs-target="#send-modal">
                                        <i class="fas fa-paper-plane"></i> Отправить
                                    </button>
                                </div>
                            </div>
                            <div class="card-body p-0" id="notif-list">
                                <div class="text-center py-4"><i class="fas fa-spinner fa-spin"></i></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- Send modal -->
    <div class="modal fade" id="send-modal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title"><i class="fas fa-paper-plane mr-2"></i>Отправить уведомление</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form id="send-form">
                    <div class="modal-body">
                        <div class="form-group">
                            <label>Получатель <span class="text-danger">*</span></label>
                            <select class="form-control" id="recipient-select" required>
                                <option value="">— Выберите пользователя —</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Заголовок <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="notif-title" required minlength="2" maxlength="255">
                        </div>
                        <div class="form-group">
                            <label>Сообщение <span class="text-danger">*</span></label>
                            <textarea class="form-control" id="notif-body" rows="4" required minlength="2" maxlength="5000"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                        <button type="submit" class="btn btn-primary"><i class="fas fa-paper-plane"></i> Отправить</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer class="main-footer"><strong>Школьный журнал</strong> &copy; 2024</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/guards.js"></script>
<script src="/js/pages/teacher/common.js"></script>
<script>
    requireAuth('teacher');

    let allNotifs = [];

    function renderNotifs(notifs) {
        const container = document.getElementById('notif-list');
        if (!notifs.length) {
            container.innerHTML = '<div class="text-center text-muted py-4">Нет уведомлений</div>';
            return;
        }
        container.innerHTML = notifs.map(n => `
            <div class="d-flex align-items-start p-3 border-bottom ${n.is_read ? '' : 'bg-light'}">
                <i class="fas fa-bell ${n.is_read ? 'text-muted' : 'text-primary'} mr-3 mt-1 fa-lg"></i>
                <div class="flex-grow-1">
                    <div class="d-flex justify-content-between align-items-start">
                        <strong>${n.title}</strong>
                        <small class="text-muted ml-2">${new Date(n.created_at).toLocaleString('ru')}</small>
                    </div>
                    <div class="text-muted mt-1">${n.body}</div>
                </div>
                ${!n.is_read ? `
                <button class="btn btn-xs btn-outline-primary ml-3" onclick="markRead('${n.id}', this)" title="Отметить прочитанным">
                    <i class="fas fa-check"></i>
                </button>` : ''}
            </div>`).join('');
    }

    async function markRead(id, btn) {
        try {
            await api.patch(`/notifications/${id}/read`);
            const row = btn.closest('.d-flex');
            row.classList.remove('bg-light');
            row.querySelector('.fa-bell').classList.replace('text-primary', 'text-muted');
            btn.remove();
            const notif = allNotifs.find(n => n.id === id);
            if (notif) notif.is_read = true;
        } catch (err) { showAlert(err.message); }
    }

    document.getElementById('unread-only').addEventListener('change', function () {
        renderNotifs(this.checked ? allNotifs.filter(n => !n.is_read) : allNotifs);
    });

    document.getElementById('send-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        try {
            await api.post('/notifications/', {
                recipient_id: document.getElementById('recipient-select').value,
                title:        document.getElementById('notif-title').value,
                body:         document.getElementById('notif-body').value,
            });
            bootstrap.Modal.getInstance(document.getElementById('send-modal')).hide();
            e.target.reset();
            showAlert('Уведомление отправлено', 'success');
        } catch (err) { showAlert(err.message); }
    });

    (async () => {
        await loadTeacherComponents('notifications');

        const [notifs, users] = await Promise.all([
            api.get('/notifications/'),
            api.get('/users/'),
        ]);

        allNotifs = notifs;
        renderNotifs(notifs);

        const sel = document.getElementById('recipient-select');
        users.forEach(u => {
            const opt = document.createElement('option');
            opt.value = u.id;
            opt.textContent = `${u.last_name} ${u.first_name} (${u.email})`;
            sel.appendChild(opt);
        });
    })();
</script>
</body>
</html>

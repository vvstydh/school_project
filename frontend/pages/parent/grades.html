<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оценки детей — Школьный журнал</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/custom.css">
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">
    <div id="navbar"></div>
    <div id="sidebar"></div>

    <div class="content-wrapper">
        <div class="content-header">
            <div class="container-fluid">
                <div class="row mb-2">
                    <div class="col-sm-6"><h1 class="m-0">Оценки детей</h1></div>
                    <div class="col-sm-6">
                        <ol class="breadcrumb float-sm-right">
                            <li class="breadcrumb-item"><a href="/pages/parent/dashboard.html">Главная</a></li>
                            <li class="breadcrumb-item active">Оценки</li>
                        </ol>
                    </div>
                </div>
            </div>
        </div>

        <section class="content">
            <div class="container-fluid">
                <div id="alerts"></div>

                <!-- Фильтры -->
                <div class="card card-outline card-primary">
                    <div class="card-body">
                        <div class="row align-items-end">
                            <div class="col-md-3">
                                <label>Ребёнок</label>
                                <select class="form-control" id="filter-child">
                                    <option value="">Все дети</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label>Оценка</label>
                                <select class="form-control" id="filter-value">
                                    <option value="">Все</option>
                                    <option value="5">5 — Отлично</option>
                                    <option value="4">4 — Хорошо</option>
                                    <option value="3">3 — Удовлетворительно</option>
                                    <option value="2">2 — Неудовлетворительно</option>
                                    <option value="1">1</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Средний балл по детям -->
                <div class="row" id="avg-cards"></div>

                <!-- Таблица -->
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title"><i class="fas fa-star mr-2"></i>Все оценки</h3>
                    </div>
                    <div class="card-body p-0">
                        <table class="table table-hover">
                            <thead>
                                <tr><th>Ребёнок</th><th>Дата</th><th>Предмет</th><th>Тема</th><th>Оценка</th><th>Комментарий</th></tr>
                            </thead>
                            <tbody id="grades-tbody">
                                <tr><td colspan="6" class="text-center py-4"><i class="fas fa-spinner fa-spin"></i></td></tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="card-footer text-muted" id="grades-footer"></div>
                </div>
            </div>
        </section>
    </div>
    <footer class="main-footer"><strong>Школьный журнал</strong> &copy; 2024</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/guards.js"></script>
<script src="/js/pages/parent/common.js"></script>
<script>
    requireAuth('parent');

    let allGrades = [], lessonsMap = {}, childMap = {};

    function renderGrades(grades) {
        const tbody = document.getElementById('grades-tbody');
        document.getElementById('grades-footer').textContent = `Показано: ${grades.length} оценок`;
        const sorted = [...grades].sort((a, b) => {
            const la = lessonsMap[a.lesson_id], lb = lessonsMap[b.lesson_id];
            return (lb?.date || '').localeCompare(la?.date || '');
        });
        if (!sorted.length) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-3">Оценок нет</td></tr>';
            return;
        }
        tbody.innerHTML = sorted.map(g => {
            const l = lessonsMap[g.lesson_id] || {};
            return `<tr>
                <td>${childMap[g.student_id] || '—'}</td>
                <td>${l.date || '—'}</td>
                <td>${l.subject_name || '—'}</td>
                <td><small>${l.topic || '—'}</small></td>
                <td><span class="badge badge-${GRADE_COLORS[g.value]} px-2" style="font-size:1rem">${g.value}</span></td>
                <td><small class="text-muted">${g.comment || '—'}</small></td>
            </tr>`;
        }).join('');
    }

    function applyFilters() {
        const child = document.getElementById('filter-child').value;
        const value = document.getElementById('filter-value').value;
        let f = allGrades;
        if (child) f = f.filter(g => g.student_id === child);
        if (value) f = f.filter(g => String(g.value) === value);
        renderGrades(f);
    }

    document.getElementById('filter-child').addEventListener('change', applyFilters);
    document.getElementById('filter-value').addEventListener('change', applyFilters);

    (async () => {
        const me = await loadParentComponents('grades');
        const children = me.children || [];

        if (!children.length) {
            document.getElementById('alerts').innerHTML = '<div class="alert alert-warning"><i class="fas fa-exclamation-triangle mr-2"></i>Нет привязанных детей. Обратитесь к администратору.</div>';
            document.getElementById('grades-tbody').innerHTML = '<tr><td colspan="6" class="text-center text-muted">Нет данных</td></tr>';
            return;
        }

        // Заполнить childMap и фильтр
        const sel = document.getElementById('filter-child');
        children.forEach(c => {
            childMap[c.id] = `${c.last_name} ${c.first_name}`;
            const opt = document.createElement('option');
            opt.value = c.id;
            opt.textContent = `${c.last_name} ${c.first_name}`;
            sel.appendChild(opt);
        });

        // Проверка URL параметра
        const urlChild = new URLSearchParams(window.location.search).get('child');
        if (urlChild) sel.value = urlChild;

        const [gradesArr, lessons] = await Promise.all([
            Promise.all(children.map(c => api.get(`/grades/?student_id=${c.id}`))),
            api.get('/lessons/'),
        ]);

        lessons.forEach(l => { lessonsMap[l.id] = l; });
        allGrades = gradesArr.flat();

        // Средний балл карточки
        const cardsRow = document.getElementById('avg-cards');
        const bgColors = ['bg-info', 'bg-success', 'bg-warning', 'bg-primary'];
        cardsRow.innerHTML = children.map((c, i) => {
            const cGrades = gradesArr[i];
            const avg = cGrades.length
                ? (cGrades.reduce((s, g) => s + g.value, 0) / cGrades.length).toFixed(1)
                : '—';
            return `<div class="col-lg-3 col-6">
                <div class="small-box ${bgColors[i % bgColors.length]}">
                    <div class="inner">
                        <h3>${avg}</h3>
                        <p>${c.last_name} ${c.first_name}</p>
                    </div>
                    <div class="icon"><i class="fas fa-star"></i></div>
                    <span class="small-box-footer">${cGrades.length} оценок</span>
                </div>
            </div>`;
        }).join('');

        applyFilters();
    })();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная — Школьный журнал</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/custom.css">
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">
    <div id="navbar"></div>
    <div id="sidebar"></div>

    <div class="content-wrapper">
        <div class="content-header">
            <div class="container-fluid">
                <div class="row mb-2">
                    <div class="col-sm-6"><h1 class="m-0">Главная</h1></div>
                    <div class="col-sm-6">
                        <ol class="breadcrumb float-sm-right">
                            <li class="breadcrumb-item active">Главная</li>
                        </ol>
                    </div>
                </div>
            </div>
        </div>

        <section class="content">
            <div class="container-fluid">

                <!-- Выбор ребёнка -->
                <div class="row mb-3" id="children-selector-row" style="display:none">
                    <div class="col-md-4">
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <span class="input-group-text"><i class="fas fa-child"></i></span>
                            </div>
                            <select class="form-control" id="child-select">
                                <option value="">Все дети</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Нет детей -->
                <div class="alert alert-warning" id="no-children-alert" style="display:none">
                    <i class="fas fa-exclamation-triangle mr-2"></i>
                    Ваш аккаунт не связан ни с одним учеником. Обратитесь к администратору.
                </div>

                <!-- Карточки детей -->
                <div class="row" id="children-cards"></div>

                <div class="row" id="main-content" style="display:none">
                    <!-- Последние оценки -->
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">
                                <h3 class="card-title"><i class="fas fa-star mr-2"></i>Последние оценки</h3>
                                <div class="card-tools">
                                    <a href="/pages/parent/grades.html" class="btn btn-sm btn-primary">Все оценки</a>
                                </div>
                            </div>
                            <div class="card-body p-0">
                                <table class="table table-hover">
                                    <thead><tr><th>Ребёнок</th><th>Дата</th><th>Предмет</th><th>Оценка</th></tr></thead>
                                    <tbody id="recent-grades">
                                        <tr><td colspan="4" class="text-center py-3"><i class="fas fa-spinner fa-spin"></i></td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <!-- Пропуски -->
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">
                                <h3 class="card-title"><i class="fas fa-clipboard-check mr-2"></i>Последние пропуски</h3>
                                <div class="card-tools">
                                    <a href="/pages/parent/attendances.html" class="btn btn-sm btn-primary">Подробнее</a>
                                </div>
                            </div>
                            <div class="card-body p-0">
                                <table class="table table-hover">
                                    <thead><tr><th>Ребёнок</th><th>Дата</th><th>Статус</th></tr></thead>
                                    <tbody id="recent-absences">
                                        <tr><td colspan="3" class="text-center py-3"><i class="fas fa-spinner fa-spin"></i></td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <!-- Уведомления -->
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">
                                <h3 class="card-title"><i class="fas fa-bell mr-2"></i>Новые уведомления</h3>
                                <div class="card-tools">
                                    <a href="/pages/parent/notifications.html" class="btn btn-sm btn-primary">Все</a>
                                </div>
                            </div>
                            <div class="card-body p-0" id="notif-list">
                                <div class="text-center py-3"><i class="fas fa-spinner fa-spin"></i></div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </section>
    </div>
    <footer class="main-footer"><strong>Школьный журнал</strong> &copy; 2024</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/guards.js"></script>
<script src="/js/pages/parent/common.js"></script>
<script>
    requireAuth('parent');

    (async () => {
        const me = await loadParentComponents('dashboard');
        const children = me.children || [];

        if (!children.length) {
            document.getElementById('no-children-alert').style.display = '';
            return;
        }

        // Карточки детей
        const cardsRow = document.getElementById('children-cards');
        cardsRow.innerHTML = children.map(c => `
            <div class="col-md-3 col-6">
                <div class="small-box bg-info">
                    <div class="inner">
                        <h5>${c.last_name} ${c.first_name}</h5>
                        <p>${c.middle_name || ''}</p>
                    </div>
                    <div class="icon"><i class="fas fa-user-graduate"></i></div>
                    <a href="/pages/parent/grades.html?child=${c.id}" class="small-box-footer">Оценки <i class="fas fa-arrow-circle-right"></i></a>
                </div>
            </div>`).join('');

        // Выбор ребёнка
        if (children.length > 1) {
            document.getElementById('children-selector-row').style.display = '';
            const sel = document.getElementById('child-select');
            children.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.id;
                opt.textContent = `${c.last_name} ${c.first_name}`;
                sel.appendChild(opt);
            });
        }

        document.getElementById('main-content').style.display = '';

        const [allGrades, allAtts, lessons, notifs] = await Promise.all([
            Promise.all(children.map(c => api.get(`/grades/?student_id=${c.id}`))).then(r => r.flat()),
            Promise.all(children.map(c => api.get(`/attendances/?student_id=${c.id}`))).then(r => r.flat()),
            api.get('/lessons/'),
            api.get('/notifications/'),
        ]);

        const lessonsMap = {};
        lessons.forEach(l => { lessonsMap[l.id] = l; });
        const childMap = {};
        children.forEach(c => { childMap[c.id] = `${c.last_name} ${c.first_name}`; });

        // Последние оценки
        const recentGrades = [...allGrades].sort((a, b) => {
            const la = lessonsMap[a.lesson_id], lb = lessonsMap[b.lesson_id];
            return (lb?.date || '').localeCompare(la?.date || '');
        }).slice(0, 6);

        const gradesTbody = document.getElementById('recent-grades');
        gradesTbody.innerHTML = recentGrades.length
            ? recentGrades.map(g => {
                const l = lessonsMap[g.lesson_id] || {};
                return `<tr>
                    <td><small>${childMap[g.student_id] || '—'}</small></td>
                    <td>${l.date || '—'}</td>
                    <td><small>${l.subject_name || '—'}</small></td>
                    <td><span class="badge badge-${GRADE_COLORS[g.value]} px-2" style="font-size:1rem">${g.value}</span></td>
                </tr>`;
            }).join('')
            : '<tr><td colspan="4" class="text-center text-muted">Оценок нет</td></tr>';

        // Последние пропуски
        const absences = allAtts.filter(a => a.status !== 'present')
            .sort((a, b) => {
                const la = lessonsMap[a.lesson_id], lb = lessonsMap[b.lesson_id];
                return (lb?.date || '').localeCompare(la?.date || '');
            }).slice(0, 6);

        const absTbody = document.getElementById('recent-absences');
        absTbody.innerHTML = absences.length
            ? absences.map(a => {
                const l = lessonsMap[a.lesson_id] || {};
                const info = ATTENDANCE_LABELS[a.status];
                return `<tr>
                    <td><small>${childMap[a.student_id] || '—'}</small></td>
                    <td>${l.date || '—'}</td>
                    <td><span class="badge badge-${info.color}">${info.label}</span></td>
                </tr>`;
            }).join('')
            : '<tr><td colspan="3" class="text-center text-muted">Пропусков нет</td></tr>';

        // Уведомления
        const unread = notifs.filter(n => !n.is_read).slice(0, 4);
        const nc = document.getElementById('notif-list');
        nc.innerHTML = unread.length
            ? unread.map(n => `
                <div class="d-flex p-3 border-bottom bg-light">
                    <i class="fas fa-bell text-primary mr-3 mt-1"></i>
                    <div>
                        <strong>${n.title}</strong>
                        <div class="text-muted small">${n.body.slice(0, 70)}${n.body.length > 70 ? '...' : ''}</div>
                    </div>
                </div>`).join('')
            : '<div class="text-center text-muted py-3">Нет новых уведомлений</div>';
    })();
</script>
</body>
</html>
